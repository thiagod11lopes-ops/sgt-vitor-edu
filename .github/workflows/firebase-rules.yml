name: Firebase — regras (Firestore + Storage)

on:
  push:
    branches: [master, main]
    paths:
      - firestore.rules
      - firestore.indexes.json
      - storage.rules
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Aviso — FIREBASE_TOKEN não configurado
        if: secrets.FIREBASE_TOKEN == ''
        run: |
          echo "::warning::Secret FIREBASE_TOKEN ausente no GitHub. Regras não serão publicadas por este workflow."
          echo "Para ativar: npm run firebase:ci-token → Settings → Secrets → Actions → FIREBASE_TOKEN"

      - name: Deploy Firestore rules
        if: secrets.FIREBASE_TOKEN != ''
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only firestore --project sgt-vitor-edu --non-interactive --token "$FIREBASE_TOKEN"

      - name: Deploy Storage rules
        if: secrets.FIREBASE_TOKEN != ''
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only storage --project sgt-vitor-edu --non-interactive --token "$FIREBASE_TOKEN"
