name: Firebase — regras (Firestore + Storage)

on:
  push:
    branches: [master, main]
    paths:
      - firestore.rules
      - firestore.indexes.json
      - storage.rules
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore and Storage rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::warning::Secret FIREBASE_TOKEN ausente. Configure em Settings → Secrets → Actions."
            echo "Gere o token localmente: npm run firebase:ci-token"
            exit 0
          fi

          firebase deploy --only firestore --project sgt-vitor-edu --non-interactive --token "$FIREBASE_TOKEN"

          if ! firebase deploy --only storage --project sgt-vitor-edu --non-interactive --token "$FIREBASE_TOKEN"; then
            echo "::warning::Storage rules não publicadas. Ative o Firebase Storage no Console se ainda não fez."
          fi
