name: CI

on:
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (GitHub Pages path)
        env:
          VITE_BASE_PATH: /sgt-vitor-edu/
        run: npm run build

      - name: Build local (dev)
        run: npm run build
