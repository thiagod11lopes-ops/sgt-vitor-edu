name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build (dev — todas as rotas)
        run: npm run build

      - name: Build app surface
        run: npm run build:app

      - name: Build system admin surface
        run: npm run build:admin

      - name: Build store admin surface
        run: npm run build:store
