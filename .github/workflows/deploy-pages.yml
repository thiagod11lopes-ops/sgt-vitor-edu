name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          VITE_BASE_PATH: /sgt-vitor-edu/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_AI_API_URL: ${{ secrets.VITE_AI_API_URL }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_STORE_ADMIN_PASSWORD: ${{ secrets.VITE_STORE_ADMIN_PASSWORD }}
          VITE_SYSTEM_ADMIN_GOOGLE_EMAILS: ${{ secrets.VITE_SYSTEM_ADMIN_GOOGLE_EMAILS }}
          VITE_STORE_ADMIN_GOOGLE_EMAILS: ${{ secrets.VITE_STORE_ADMIN_GOOGLE_EMAILS }}
        run: npm run build

      - name: SPA fallback (rotas diretas no GitHub Pages)
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (tentativa 1)
        id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (tentativa 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Deploy to GitHub Pages (tentativa 3)
        id: deployment
        if: steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Falha no deploy
        if: steps.deploy1.outcome != 'success' && steps.deploy2.outcome != 'success' && (steps.deployment.outcome != 'success' || steps.deployment.outcome == 'skipped')
        run: |
          echo "::error::GitHub Pages recusou o deploy após 3 tentativas. Reexecute o workflow manualmente."
          exit 1
